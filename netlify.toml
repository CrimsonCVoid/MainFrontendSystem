# Netlify Configuration for Next.js 14 App
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = ".next"

# Next.js Runtime Plugin (auto handles routing, images, functions, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

#############################################
# REDIRECTS (Next.js plugin handles routing)
#############################################

# Optional SPA fallback only if you're serving static pages
# The Next.js plugin usually handles routing automatically
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

#############################################
# HEADERS (Security + Performance)
#############################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API routes should not be cached
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

#############################################
# FUNCTIONS (Netlify bundles dependencies automatically)
#############################################

[functions]
  node_bundler = "esbuild"
  # DO NOT include node_modules — Netlify handles it automatically
  # included_files = []    # <-- safe default, no need to include anything
